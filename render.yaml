services:
  - type: web
    name: voice-agent-mem0
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.app
    envVars:
      - key: SERVER_NAME
        value: 0.0.0.0
      - key: SERVER_PORT
        fromContext: port
      - key: GROQ_API_KEY
        sync: false
