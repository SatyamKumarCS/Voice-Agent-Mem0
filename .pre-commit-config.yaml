repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
    -   id: ruff
        args: [ --fix ]
    -   id: ruff-format

-   repo: local
    hooks:
    -   id: tests
        name: Run Intent and STT Tests
        entry: bash -c 'PYTHON=$(if [ -d venv ]; then echo "./venv/bin/python3"; else echo "python3"; fi); $PYTHON -m tests.test_intent && $PYTHON -m tests.test_stt && $PYTHON -m tests.test_tools'
        language: system
        pass_filenames: false
        always_run: true
